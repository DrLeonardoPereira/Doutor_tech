<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doutor Tech - Teste Cognitivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* ===== TELA INICIAL ===== */
        #startScreen {
            gap: 20px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #playerForm {
            width: 100%;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* ===== TELA DO JOGO ===== */
        #gameScreen {
            flex-direction: column;
            gap: 30px;
        }

        .player-info {
            text-align: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        #playerGreeting {
            font-size: 1.5em;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }

        #playerStats {
            color: #666;
            font-size: 0.95em;
        }

        .game-stats {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            flex: 1;
            min-width: 100px;
            text-align: center;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.85em;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 2em;
            color: #667eea;
            font-weight: 700;
        }

        #timer {
            transition: color 0.3s;
        }

        .timer-warning {
            color: #ef4444 !important;
        }

        #gameArea {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
            width: 100%;
        }

        .game-button {
            aspect-ratio: 1;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-button:hover:not(.active) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .game-button.active {
            transform: scale(0.95);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            filter: brightness(1.2);
        }

        /* ===== TELA DE RESULTADOS ===== */
        #resultScreen {
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .result-title {
            font-size: 2em;
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .result-section {
            margin-bottom: 25px;
        }

        .result-section h3 {
            color: #764ba2;
            margin-bottom: 12px;
            font-size: 1.1em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
            color: #666;
        }

        .result-value {
            color: #667eea;
            font-weight: 700;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .btn:active {
            transform: translateY(0);
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2em;
            }

            .content {
                padding: 25px 20px;
            }

            .game-button {
                font-size: 1em;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                min-width: 100%;
            }

            .game-stats {
                gap: 10px;
            }

            .stat-box {
                padding: 10px;
            }

            .stat-value {
                font-size: 1.5em;
            }
        }

        /* ===== ANIMAÇÕES ===== */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .screen.active {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Doutor Tech</h1>
            <p>Teste Cognitivo de Memória</p>
        </div>

        <div class="content">
            <!-- TELA INICIAL -->
            <div id="startScreen" class="screen">
                <form id="playerForm">
                    <h2 style="text-align: center; margin-bottom: 25px; color: #333;">Bem-vindo ao Jogo!</h2>
                    
                    <div class="form-group">
                        <label for="playerName">Nome:</label>
                        <input type="text" id="playerName" required placeholder="Digite seu nome">
                    </div>

                    <div class="form-group">
                        <label for="playerAge">Idade:</label>
                        <input type="number" id="playerAge" min="1" max="120" required placeholder="Digite sua idade">
                    </div>

                    <div class="form-group">
                        <label for="playerSex">Sexo:</label>
                        <select id="playerSex" required>
                            <option value="">Selecione...</option>
                            <option value="masculino">Masculino</option>
                            <option value="feminino">Feminino</option>
                            <option value="outro">Outro</option>
                            <option value="prefiro_nao_informar">Prefiro não informar</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="playerEducation">Escolaridade:</label>
                        <select id="playerEducation" required>
                            <option value="">Selecione...</option>
                            <option value="fundamental_incompleto">Fundamental Incompleto</option>
                            <option value="fundamental_completo">Fundamental Completo</option>
                            <option value="medio_incompleto">Médio Incompleto</option>
                            <option value="medio_completo">Médio Completo</option>
                            <option value="superior_incompleto">Superior Incompleto</option>
                            <option value="superior_completo">Superior Completo</option>
                            <option value="pos_graduacao">Pós-Graduação</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn">Começar Jogo</button>
                </form>
            </div>

            <!-- TELA DO JOGO -->
            <div id="gameScreen" class="screen">
                <div class="player-info">
                    <div id="playerGreeting">Bem-vindo!</div>
                    <div id="playerStats">Seus dados</div>
                </div>

                <div class="game-stats">
                    <div class="stat-box">
                        <div class="stat-label">Pontuação</div>
                        <div class="stat-value" id="score">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Nível</div>
                        <div class="stat-value" id="level">1</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Tempo</div>
                        <div class="stat-value" id="timer">60s</div>
                    </div>
                </div>

                <div id="gameArea"></div>

                <button id="backButton" class="btn btn-secondary" style="margin-top: 20px;">Voltar</button>
            </div>

            <!-- TELA DE RESULTADOS -->
            <div id="resultScreen" class="screen">
                <div class="result-title">🎉 Jogo Finalizado!</div>

                <div class="result-section">
                    <h3>Dados do Jogador</h3>
                    <div class="result-item">
                        <span class="result-label">Nome:</span>
                        <span class="result-value" id="resultName">-</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Idade:</span>
                        <span class="result-value" id="resultAge">-</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Sexo:</span>
                        <span class="result-value" id="resultSex">-</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Escolaridade:</span>
                        <span class="result-value" id="resultEducation">-</span>
                    </div>
                </div>

                <div class="result-section">
                    <h3>Resultado do Jogo</h3>
                    <div class="result-item">
                        <span class="result-label">Pontuação Final:</span>
                        <span class="result-value" id="resultScore">0</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Nível Alcançado:</span>
                        <span class="result-value" id="resultLevel">1</span>
                    </div>
                </div>

                <div class="button-group">
                    <button id="playAgainButton" class="btn btn-primary">Jogar Novamente</button>
                    <button id="downloadButton" class="btn btn-secondary">Baixar Resultado</button>
                    <button id="backButton2" class="btn btn-secondary" onclick="goBackToStart()">Voltar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== VARIÁVEIS GLOBAIS ==========
        let playerData = {
            name: '',
            age: 0,
            sex: '',
            education: ''
        };

        let gameData = {
            score: 0,
            level: 1,
            timeRemaining: 60,
            gameActive: false,
            sequence: [],
            userSequence: [],
            timer: null
        };

        // ========== ELEMENTOS DO DOM ==========
        const startScreen = document.getElementById('startScreen');
        const gameScreen = document.getElementById('gameScreen');
        const resultScreen = document.getElementById('resultScreen');

        const playerForm = document.getElementById('playerForm');
        const playerGreeting = document.getElementById('playerGreeting');
        const playerStats = document.getElementById('playerStats');
        const gameArea = document.getElementById('gameArea');

        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const timerDisplay = document.getElementById('timer');

        const backButton = document.getElementById('backButton');
        const playAgainButton = document.getElementById('playAgainButton');
        const downloadButton = document.getElementById('downloadButton');

        // Mapa de educação para exibição amigável
        const educationMap = {
            'fundamental_incompleto': 'Fundamental Incompleto',
            'fundamental_completo': 'Fundamental Completo',
            'medio_incompleto': 'Médio Incompleto',
            'medio_completo': 'Médio Completo',
            'superior_incompleto': 'Superior Incompleto',
            'superior_completo': 'Superior Completo',
            'pos_graduacao': 'Pós-Graduação'
        };

        const sexMap = {
            'masculino': 'Masculino',
            'feminino': 'Feminino',
            'outro': 'Outro',
            'prefiro_nao_informar': 'Prefiro não informar'
        };

        // ========== EVENTOS ==========
        playerForm.addEventListener('submit', handleFormSubmit);
        backButton.addEventListener('click', goBackToStart);
        playAgainButton.addEventListener('click', resetGame);
        downloadButton.addEventListener('click', downloadResult);

        // ========== FUNÇÕES PRINCIPAIS ==========

        /**
         * Manipula o envio do formulário
         */
        function handleFormSubmit(e) {
            e.preventDefault();

            // Validar se todos os campos estão preenchidos
            const name = document.getElementById('playerName').value.trim();
            const age = document.getElementById('playerAge').value;
            const sex = document.getElementById('playerSex').value;
            const education = document.getElementById('playerEducation').value;

            if (!name || !age || !sex || !education) {
                alert('Por favor, preencha todos os campos!');
                return;
            }

            // Armazenar dados do jogador
            playerData = {
                name: name,
                age: parseInt(age),
                sex: sex,
                education: education
            };

            // Iniciar o jogo
            startGame();
        }

        /**
         * Inicializa o jogo
         */
        function startGame() {
            // Limpar dados do jogo anterior
            gameData.score = 0;
            gameData.level = 1;
            gameData.timeRemaining = 60;
            gameData.sequence = [];
            gameData.userSequence = [];
            gameData.gameActive = true;

            // Atualizar interface
            playerGreeting.textContent = `Bem-vindo, ${playerData.name}!`;
            playerStats.textContent = `${playerData.age} anos | ${sexMap[playerData.sex]} | ${educationMap[playerData.education]}`;

            // Trocar para tela do jogo
            startScreen.classList.remove('active');
            gameScreen.classList.add('active');

            // Criar botões do jogo
            createGameButtons();

            // Atualizar displays
            updateGameDisplay();

            // Iniciar temporizador
            startTimer();

            // Começar sequência
            generateNextLevel();
        }

        /**
         * Cria os botões do jogo
         */
        function createGameButtons() {
            gameArea.innerHTML = '';

            const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b'];
            const colorNames = ['Azul', 'Vermelho', 'Verde', 'Amarelo'];

            for (let i = 0; i < 4; i++) {
                const button = document.createElement('button');
                button.className = 'game-button';
                button.textContent = colorNames[i];
                button.style.background = colors[i];
                button.dataset.index = i;
                button.addEventListener('click', () => handleButtonClick(i, button));
                gameArea.appendChild(button);
            }
        }

        /**
         * Manipula o clique em um botão
         */
        function handleButtonClick(index, buttonElement) {
            if (!gameData.gameActive) return;

            // Adicionar à sequência do usuário
            gameData.userSequence.push(index);

            // Efeito visual
            buttonElement.classList.add('active');
            setTimeout(() => {
                buttonElement.classList.remove('active');
            }, 150);

            // Validar sequência
            if (gameData.userSequence[gameData.userSequence.length - 1] !== gameData.sequence[gameData.userSequence.length - 1]) {
                // Erro! Acertou errado
                endGame();
                return;
            }

            // Se completou a sequência corretamente
            if (gameData.userSequence.length === gameData.sequence.length) {
                gameData.userSequence = [];
                gameData.score += 10 * gameData.level;
                gameData.level++;
                updateGameDisplay();

                // Pequena pausa antes do próximo nível
                setTimeout(() => {
                    generateNextLevel();
                }, 500);
            }
        }

        /**
         * Gera o próximo nível da sequência
         */
        function generateNextLevel() {
            gameData.sequence.push(Math.floor(Math.random() * 4));
            playSequence();
        }

        /**
         * Toca a sequência de forma visual
         */
        async function playSequence() {
            gameData.gameActive = false;

            for (let i = 0; i < gameData.sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 600));

                const index = gameData.sequence[i];
                const buttons = gameArea.querySelectorAll('.game-button');
                const button = buttons[index];

                button.classList.add('active');
                await new Promise(resolve => setTimeout(resolve, 300));
                button.classList.remove('active');
            }

            gameData.gameActive = true;
            gameData.userSequence = [];
        }

        /**
         * Inicia o temporizador
         */
        function startTimer() {
            gameData.timer = setInterval(() => {
                gameData.timeRemaining--;
                updateGameDisplay();

                if (gameData.timeRemaining <= 0) {
                    clearInterval(gameData.timer);
                    endGame();
                }
            }, 1000);
        }

        /**
         * Atualiza a exibição do jogo
         */
        function updateGameDisplay() {
            scoreDisplay.textContent = gameData.score;
            levelDisplay.textContent = gameData.level;
            timerDisplay.textContent = gameData.timeRemaining + 's';

            // Mudar cor do timer se estiver acabando
            if (gameData.timeRemaining <= 10) {
                timerDisplay.style.color = '#ef4444';
            } else {
                timerDisplay.style.color = '';
            }
        }

        /**
         * Termina o jogo
         */
        function endGame() {
            gameData.gameActive = false;
            clearInterval(gameData.timer);

            // Aguardar um momento e mostrar resultado
            setTimeout(() => {
                showResults();
            }, 500);
        }

        /**
         * Exibe a tela de resultados
         */
        function showResults() {
            gameScreen.classList.remove('active');
            resultScreen.classList.add('active');

            // Preencher dados de resultado
            document.getElementById('resultName').textContent = playerData.name;
            document.getElementById('resultAge').textContent = playerData.age + ' anos';
            document.getElementById('resultSex').textContent = sexMap[playerData.sex];
            document.getElementById('resultEducation').textContent = educationMap[playerData.education];
            document.getElementById('resultScore').textContent = gameData.score;
            document.getElementById('resultLevel').textContent = gameData.level;
        }

        /**
         * Volta para a tela inicial
         */
        function goBackToStart() {
            gameData.gameActive = false;
            clearInterval(gameData.timer);

            gameScreen.classList.remove('active');
            resultScreen.classList.remove('active');
            startScreen.classList.add('active');

            // Limpar formulário
            playerForm.reset();
        }

        /**
         * Reinicia o jogo com o mesmo jogador
         */
        function resetGame() {
            resultScreen.classList.remove('active');
            startGame();
        }

        /**
         * Baixa o resultado em JSON
         */
        function downloadResult() {
            const result = {
                timestamp: new Date().toLocaleString('pt-BR'),
                jogador: {
                    nome: playerData.name,
                    idade: playerData.age,
                    sexo: sexMap[playerData.sex],
                    escolaridade: educationMap[playerData.education]
                },
                resultado: {
                    pontuacao: gameData.score,
                    nivel: gameData.level,
                    tempoJogo: 60 + ' segundos'
                }
            };

            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(result, null, 2)));
            element.setAttribute('download', `resultado_${playerData.name.replace(/\s+/g, '_')}_${Date.now()}.json`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        // ========== INICIALIZAÇÃO ==========
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Doutor Tech - Teste Cognitivo Carregado');
            startScreen.classList.add('active');
        });
    </script>
</body>
</html>
