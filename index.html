<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doutor Tech - Teste Cognitivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* ===== TELA INICIAL ===== */
        #startScreen {
            gap: 20px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #playerForm {
            width: 100%;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* ===== TELA DO JOGO ===== */
        #gameScreen {
            flex-direction: column;
            gap: 30px;
        }

        .player-info {
            text-align: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        #playerGreeting {
            font-size: 1.5em;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }

        #playerStats {
            color: #666;
            font-size: 0.95em;
        }

        .game-stats {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            flex: 1;
            min-width: 100px;
            text-align: center;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.85em;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 2em;
            color: #667eea;
            font-weight: 700;
        }

        #timer {
            transition: color 0.3s;
        }

        .timer-warning {
            color: #ef4444 !important;
        }

        #gameArea {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
            width: 100%;
        }

        .game-button {
            aspect-ratio: 1;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-button:hover:not(.active) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .game-button.active {
            transform: scale(0.95);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            filter: brightness(1.2);
        }

        /* ===== TELA DE RESULTADOS ===== */
        #resultScreen {
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .result-title {
            font-size: 2em;
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .result-section {
            margin-bottom: 25px;
        }

        .result-section h3 {
            color: #764ba2;
            margin-bottom: 12px;
            font-size: 1.1em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
            color: #666;
        }

        .result-value {
            color: #667eea;
            font-weight: 700;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .btn:active {
            transform: translateY(0);
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2em;
            }

            .content {
                padding: 25px 20px;
            }

            .game-button {
                font-size: 1em;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                min-width: 100%;
            }

            .game-stats {
                gap: 10px;
            }

            .stat-box {
                padding: 10px;
            }

            .stat-value {
                font-size: 1.5em;
            }
        }

        /* ===== ANIMAÇÕES ===== */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .screen.active {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Doutor Tech</h1>
            <p>Teste Cognitivo de Memória</p>
        </div>

        <div class="content">
            <!-- TELA INICIAL -->
            <div id="startScreen" class="screen">
                <form id="playerForm">
                    <h2 style="text-align: center; margin-bottom: 25px; color: #333;">Bem-vindo ao Jogo!</h2>
                    
                    <div class="form-group">
                        <label for="playerName">Nome:</label>
                        <input type="text" id="playerName" required placeholder="Digite seu nome">
                    </div>

                    <div class="form-group">
                        <label for="playerAge">Idade:</label>
                        <input type="number" id="playerAge" min="1" max="120" required placeholder="Digite sua idade">
                    </div>

                    <div class="form-group">
                        <label for="playerSex">Sexo:</label>
                        <select id="playerSex" required>
                            <option value="">Selecione...</option>
                            <option value="masculino">Masculino</option>
                            <option value="feminino">Feminino</option>
                            <option value="outro">Outro</option>
                            <option value="prefiro_nao_informar">Prefiro não informar</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="playerEducation">Escolaridade:</label>
                        <select id="playerEducation" required>
                            <option value="">Selecione...</option>
                            <option value="fundamental_incompleto">Fundamental Incompleto</option>
                            <option value="fundamental_completo">Fundamental Completo</option>
                            <option value="medio_incompleto">Médio Incompleto</option>
                            <option value="medio_completo">Médio Completo</option>
                            <option value="superior_incompleto">Superior Incompleto</option>
                            <option value="superior_completo">Superior Completo</option>
                            <option value="pos_graduacao">Pós-Graduação</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn">Começar Jogo</button>
                </form>
            </div>

            <!-- TELA DO JOGO -->
            <div id="gameScreen" class="screen">
                <div class="player-info">
                    <div id="playerGreeting">Bem-vindo!</div>
                    <div id="playerStats">Seus dados</div>
                </div>

                <div class="game-stats">
                    <div class="stat-box">
                        <div class="stat-label">Pontuação</div>
                        <div class="stat-value" id="score">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Nível</div>
                        <div class="stat-value" id="level">1</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Tempo</div>
                        <div class="stat-value" id="timer">60s</div>
                    </div>
                </div>

                <div id="gameArea"></div>

                <button id="backButton" class="btn btn-secondary" style="margin-top: 20px;">Voltar</button>
            </div>

            <!-- TELA DE RESULTADOS -->
            <div id="resultScreen" class="screen">
                <div class="result-title">Jogo Finalizado!</div>

                <div class="result-section">
                    <h3>Dados do Jogador</h3>
                    <div class="result-item">
                        <span class="result-label">Nome:</span>
                        <span class="result-value" id="resultName">-</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Idade:</span>
                        <span class="result-value" id="resultAge">-</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Sexo:</span>
                        <span class="result-value" id="resultSex">-</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Escolaridade:</span>
                        <span class="result-value" id="resultEducation">-</span>
                    </div>
                </div>

                <div class="result-section">
                    <h3>Resultado do Jogo</h3>
                    <div class="result-item">
                        <span class="result-label">Pontuação Final:</span>
                        <span class="result-value" id="resultScore">0</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Nível Alcançado:</span>
                        <span class="result-value" id="resultLevel">1</span>
                    </div>
                </div>

                <div class="button-group">
                    <button id="playAgainButton" class="btn btn-primary">Jogar Novamente</button>
                    <button id="downloadButton" class="btn btn-secondary">Baixar Resultado</button>
                    <button id="backButton2" class="btn btn-secondary" onclick="goBackToStart()">Voltar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
